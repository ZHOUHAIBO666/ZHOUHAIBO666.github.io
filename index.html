<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>我的小商店 - 在线下单</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f5f5;
            padding-bottom: 70px;
        }
        /* 顶部导航 */
        .header {
            background-color: #fff;
            padding: 12px 16px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 20px;
            font-weight: 600;
            color: #07c160;
        }
        .cart-icon {
            position: relative;
            cursor: pointer;
            font-size: 24px;
        }
        .cart-count {
            position: absolute;
            top: -8px;
            right: -12px;
            background-color: #ff4d4f;
            color: white;
            font-size: 12px;
            border-radius: 10px;
            padding: 0 6px;
            min-width: 18px;
            height: 18px;
            line-height: 18px;
            text-align: center;
        }
        /* 商品网格 */
        .goods-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
            padding: 16px;
        }
        .goods-card {
            background-color: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }
        .goods-card:hover {
            transform: translateY(-2px);
        }
        .goods-img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            background-color: #f0f0f0;
        }
        .goods-info {
            padding: 10px;
        }
        .goods-name {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .price {
            color: #ff4d4f;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .price small {
            font-size: 12px;
            font-weight: normal;
        }
        .btn-add {
            background-color: #07c160;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            width: 100%;
            cursor: pointer;
        }
        .btn-add:active {
            background-color: #05944c;
        }
        /* 购物车侧边栏（移动端底部抽屉） */
        .cart-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            z-index: 200;
            visibility: hidden;
            opacity: 0;
            transition: 0.3s;
        }
        .cart-overlay.active {
            visibility: visible;
            opacity: 1;
        }
        .cart-drawer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            max-height: 80vh;
            background-color: #fff;
            border-radius: 20px 20px 0 0;
            z-index: 201;
            transform: translateY(100%);
            transition: 0.3s;
            display: flex;
            flex-direction: column;
        }
        .cart-overlay.active .cart-drawer {
            transform: translateY(0);
        }
        .cart-header {
            padding: 16px;
            border-bottom: 1px solid #eee;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
        }
        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }
        .cart-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #f0f0f0;
        }
        .cart-item-img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
        }
        .cart-item-info {
            flex: 1;
        }
        .cart-item-name {
            font-size: 14px;
            margin-bottom: 4px;
        }
        .cart-item-price {
            color: #ff4d4f;
            font-size: 14px;
        }
        .cart-item-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .cart-item-actions button {
            background-color: #f0f0f0;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 14px;
            font-size: 18px;
            cursor: pointer;
        }
        .cart-total {
            padding: 16px;
            border-top: 1px solid #eee;
            background-color: #fff;
        }
        .checkout-btn {
            background-color: #07c160;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            margin-top: 10px;
            cursor: pointer;
        }
        /* 结算表单弹窗 */
        .checkout-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 300;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .checkout-modal.active {
            visibility: visible;
            opacity: 1;
        }
        .checkout-panel {
            background: white;
            width: 90%;
            max-width: 400px;
            border-radius: 20px;
            padding: 24px;
        }
        .checkout-panel input, .checkout-panel textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        .pay-demo-btn {
            background-color: #07c160;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 30px;
            margin-top: 16px;
            font-size: 16px;
            cursor: pointer;
        }
        .close-modal {
            text-align: right;
            color: #999;
            cursor: pointer;
        }
        .empty-cart {
            text-align: center;
            color: #999;
            padding: 40px;
        }
        footer {
            text-align: center;
            font-size: 12px;
            color: #999;
            padding: 20px;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">🛒 我的小店</div>
    <div class="cart-icon" id="cartIcon">
        🛍️
        <span class="cart-count" id="cartCount">0</span>
    </div>
</div>

<div class="goods-list" id="goodsList"></div>
<footer>—— 所有商品均支持在线下单 ——<br>演示模式，真实支付需接入微信支付</footer>

<!-- 购物车侧边栏 -->
<div class="cart-overlay" id="cartOverlay">
    <div class="cart-drawer">
        <div class="cart-header">
            <span>购物车</span>
            <span style="cursor:pointer" id="closeCart">✕</span>
        </div>
        <div class="cart-items" id="cartItems">
            <div class="empty-cart">购物车还是空的～</div>
        </div>
        <div class="cart-total" id="cartTotalArea">
            <div>总计: ¥<span id="cartTotalPrice">0.00</span></div>
            <button class="checkout-btn" id="checkoutBtn">去结算</button>
        </div>
    </div>
</div>

<!-- 结算表单弹窗 -->
<div class="checkout-modal" id="checkoutModal">
    <div class="checkout-panel">
        <div class="close-modal" id="closeModal">✕</div>
        <h3 style="margin-bottom: 16px;">填写收货信息</h3>
        <input type="text" id="receiverName" placeholder="收货人姓名" required>
        <input type="tel" id="receiverPhone" placeholder="手机号码" required>
        <textarea id="receiverAddress" rows="2" placeholder="详细地址" required></textarea>
        <div>订单金额: ¥<span id="modalTotalPrice">0.00</span></div>
        <button class="pay-demo-btn" id="payBtn">💰 立即支付 (演示)</button>
        <p style="font-size:12px; color:#999; margin-top:12px; text-align:center;">
            ※ 演示模式，点击即模拟支付成功。实际接入需替换为真实微信支付接口。
        </p>
    </div>
</div>

<script>
    // ---------- 商品数据（可自行修改） ----------
    const products = [
        { id: 1, name: "经典纯棉T恤", price: 79, stock: 50, image: "https://picsum.photos/200/200?random=1" },
        { id: 2, name: "休闲运动裤", price: 129, stock: 30, image: "https://picsum.photos/200/200?random=2" },
        { id: 3, name: "轻便帆布鞋", price: 99, stock: 40, image: "https://picsum.photos/200/200?random=3" },
        { id: 4, name: "简约双肩包", price: 199, stock: 20, image: "https://picsum.photos/200/200?random=4" },
        { id: 5, name: "智能手环", price: 149, stock: 25, image: "https://picsum.photos/200/200?random=5" },
        { id: 6, name: "无线耳机", price: 259, stock: 15, image: "https://picsum.photos/200/200?random=6" }
    ];

    // 购物车数据 { id, quantity }
    let cart = [];

    // 辅助函数：保存购物车到 localStorage
    function saveCart() {
        localStorage.setItem('myShopCart', JSON.stringify(cart));
    }

    // 加载购物车
    function loadCart() {
        const saved = localStorage.getItem('myShopCart');
        if (saved) {
            cart = JSON.parse(saved);
        } else {
            cart = [];
        }
        updateCartUI();
    }

    // 更新购物车界面（数量角标、列表、总价）
    function updateCartUI() {
        // 更新角标
        const totalCount = cart.reduce((sum, item) => sum + item.quantity, 0);
        document.getElementById('cartCount').innerText = totalCount;

        // 渲染购物车列表
        const cartContainer = document.getElementById('cartItems');
        if (cart.length === 0) {
            cartContainer.innerHTML = '<div class="empty-cart">购物车还是空的～</div>';
            document.getElementById('cartTotalPrice').innerText = '0.00';
            return;
        }

        let html = '';
        let totalPrice = 0;
        cart.forEach(item => {
            const product = products.find(p => p.id === item.id);
            if (!product) return;
            const itemTotal = product.price * item.quantity;
            totalPrice += itemTotal;
            html += `
                <div class="cart-item">
                    <img class="cart-item-img" src="${product.image}" alt="${product.name}">
                    <div class="cart-item-info">
                        <div class="cart-item-name">${product.name}</div>
                        <div class="cart-item-price">¥${product.price}</div>
                    </div>
                    <div class="cart-item-actions">
                        <button data-id="${product.id}" data-delta="-1">-</button>
                        <span>${item.quantity}</span>
                        <button data-id="${product.id}" data-delta="1">+</button>
                        <button data-id="${product.id}" data-delta="del" style="background:#ff4d4f; color:white;">删除</button>
                    </div>
                </div>
            `;
        });
        cartContainer.innerHTML = html;
        document.getElementById('cartTotalPrice').innerText = totalPrice.toFixed(2);

        // 绑定购物车内按钮事件
        document.querySelectorAll('.cart-item-actions button').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.dataset.id);
                const delta = btn.dataset.delta;
                if (delta === 'del') {
                    cart = cart.filter(i => i.id !== id);
                } else {
                    const deltaNum = parseInt(delta);
                    const cartItem = cart.find(i => i.id === id);
                    if (cartItem) {
                        const newQty = cartItem.quantity + deltaNum;
                        if (newQty <= 0) {
                            cart = cart.filter(i => i.id !== id);
                        } else {
                            cartItem.quantity = newQty;
                        }
                    }
                }
                saveCart();
                updateCartUI();
                renderGoodsList(); // 刷新商品页的库存按钮状态
            });
        });
    }

    // 渲染商品列表
    function renderGoodsList() {
        const container = document.getElementById('goodsList');
        let html = '';
        products.forEach(product => {
            const cartItem = cart.find(i => i.id === product.id);
            const qtyInCart = cartItem ? cartItem.quantity : 0;
            html += `
                <div class="goods-card">
                    <img class="goods-img" src="${product.image}" alt="${product.name}">
                    <div class="goods-info">
                        <div class="goods-name">${product.name}</div>
                        <div class="price">¥${product.price}</div>
                        <button class="btn-add" data-id="${product.id}">加入购物车</button>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;

        // 绑定加入购物车事件
        document.querySelectorAll('.btn-add').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.dataset.id);
                const product = products.find(p => p.id === id);
                if (!product) return;
                const existing = cart.find(i => i.id === id);
                if (existing) {
                    if (existing.quantity + 1 <= product.stock) {
                        existing.quantity += 1;
                    } else {
                        alert('库存不足');
                        return;
                    }
                } else {
                    cart.push({ id: id, quantity: 1 });
                }
                saveCart();
                updateCartUI();
                // 简单动画反馈
                btn.innerText = '已加入';
                setTimeout(() => { btn.innerText = '加入购物车'; }, 500);
            });
        });
    }

    // 打开购物车侧边栏
    function openCart() {
        document.getElementById('cartOverlay').classList.add('active');
    }
    function closeCart() {
        document.getElementById('cartOverlay').classList.remove('active');
    }

    // 结算逻辑
    let currentOrderAmount = 0;
    function showCheckout() {
        if (cart.length === 0) {
            alert('购物车是空的，请先添加商品');
            return;
        }
        const total = cart.reduce((sum, item) => {
            const p = products.find(prod => prod.id === item.id);
            return sum + (p ? p.price * item.quantity : 0);
        }, 0);
        currentOrderAmount = total;
        document.getElementById('modalTotalPrice').innerText = total.toFixed(2);
        // 清空上次输入
        document.getElementById('receiverName').value = '';
        document.getElementById('receiverPhone').value = '';
        document.getElementById('receiverAddress').value = '';
        document.getElementById('checkoutModal').classList.add('active');
        closeCart(); // 关闭购物车抽屉
    }

    function closeModal() {
        document.getElementById('checkoutModal').classList.remove('active');
    }

    // 模拟支付（实际替换为后端支付接口）
    function mockPay() {
        const name = document.getElementById('receiverName').value.trim();
        const phone = document.getElementById('receiverPhone').value.trim();
        const address = document.getElementById('receiverAddress').value.trim();
        if (!name || !phone || !address) {
            alert('请完整填写收货信息');
            return;
        }
        if (!/^1[3-9]\d{9}$/.test(phone)) {
            alert('请输入正确的手机号码');
            return;
        }

        // 模拟支付请求（真实场景：这里应调用后端接口创建订单、调起微信支付）
        // ------------------------------------------------------------------
        // 🔴 真实接入微信支付时，需要替换以下代码：
        // 1. 向后端发起 POST 请求，传递商品列表、收货信息、总金额。
        // 2. 后端调用微信支付统一下单接口，返回 prepay_id 及签名参数。
        // 3. 前端使用 wx JSAPI 支付（仅在微信浏览器内有效），
        //    或使用 H5 支付（跳转链接）。
        // 由于本演示是静态网页，这里仅展示模拟成功。
        // ------------------------------------------------------------------
        alert(`【演示模式】订单已提交！\n收货人：${name}\n电话：${phone}\n地址：${address}\n支付金额：¥${currentOrderAmount.toFixed(2)}\n\n实际场景中，此处会调起微信支付，支付成功后订单生效。`);

        // 模拟支付成功后清空购物车
        cart = [];
        saveCart();
        updateCartUI();
        renderGoodsList();
        closeModal();
        alert('支付成功（演示）！感谢购买');
    }

    // 初始化事件监听
    function bindEvents() {
        document.getElementById('cartIcon').addEventListener('click', openCart);
        document.getElementById('closeCart').addEventListener('click', closeCart);
        document.getElementById('cartOverlay').addEventListener('click', (e) => {
            if (e.target === document.getElementById('cartOverlay')) closeCart();
        });
        document.getElementById('checkoutBtn').addEventListener('click', showCheckout);
        document.getElementById('closeModal').addEventListener('click', closeModal);
        document.getElementById('payBtn').addEventListener('click', mockPay);
        document.getElementById('checkoutModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('checkoutModal')) closeModal();
        });
    }

    // 启动
    loadCart();
    renderGoodsList();
    bindEvents();
</script>
</body>
</html>
